<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Actividad 5</title>

    <!-- Bootstrap por CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS del login -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="login-container">
        <section class="login-card">

            <div class="login-info">
                <img src="img/login.png" alt="Ilustración de login" class="login-img">
                <h1>Sistema Académico</h1>
                
            </div>

            <div class="login-form">
                <h2>Iniciar sesión</h2>
                <p class="text-muted">Ingresa tu correo y contraseña.</p>

                <form id="formLogin">
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo electrónico</label>
                        <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres">
                    </div>

                    <div id="mensajeError" class="alert alert-danger d-none" role="alert"></div>

                    <button type="submit" class="btn btn-primary w-100">
                        Entrar al sistema
                    </button>
                </form>

                <div class="datos-prueba">
                    <p><strong>Ejemplo de acceso:</strong></p>
                    <p>Correo: usuario@correo.com</p>
                    <p>Contraseña: Usuario123</p>
                </div>
            </div>

        </section>
    </main>

    <!-- Librería de utilidades -->
    <script src="js/utileria.js"></script>

    <!-- JS del login -->
    <script src="js/login.js"></script>

    <!-- Bootstrap JS por CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
