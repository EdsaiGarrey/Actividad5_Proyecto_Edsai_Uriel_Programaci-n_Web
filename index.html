<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Actividad 5</title>

    <!-- Bootstrap por CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h4>Sistema</h4>
            <button id="btnCerrarSidebar" class="btn-cerrar">×</button>
        </div>

        <ul class="menu">
            <li>
                <button class="menu-btn" id="btnUsuarios">
                    Usuarios
                    <span>▼</span>
                </button>

                <ul class="submenu" id="submenuUsuarios">
                    <li>
                        <a href="#capturaUsuarios">Captura</a>
                    </li>
                </ul>
            </li>
        </ul>
    </aside>

    <!-- Contenido principal -->
    <main class="contenido">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-3">
            <button id="btnAbrirSidebar" class="btn btn-primary me-3">
                ☰
            </button>

            <span class="navbar-brand mb-0 h1">Panel principal</span>

            <div class="ms-auto dropdown">
                <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <span id="nombreUsuarioNavbar">Usuario</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <button class="dropdown-item" id="btnSalir">
                            Salir del sistema
                        </button>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Área del sistema -->
        <section class="container py-4">

            <div class="bienvenida mb-4">
                <h2>Bienvenido al sistema</h2>
                <p>
                    En esta pantalla se muestran los formularios solicitados para la captura de usuarios
                    y alumnos, usando validaciones con JavaScript.
                </p>
            </div>

            <!-- Formulario de usuarios -->
            <div class="card mb-4" id="capturaUsuarios">
                <div class="card-header bg-primary text-white">
                    Captura de usuarios
                </div>

                <div class="card-body">
                    <form id="formUsuario">
                        <div class="mb-3">
                            <label for="nombreUsuario" class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" id="nombreUsuario" placeholder="Ejemplo: Edsai García">
                        </div>

                        <div class="mb-3">
                            <label for="correoUsuario" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="correoUsuario" placeholder="ejemplo@correo.com">
                        </div>

                        <div class="mb-3">
                            <label for="passwordUsuario" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="passwordUsuario" placeholder="Mínimo 6 caracteres">
                        </div>

                        <button type="submit" class="btn btn-success">
                            Guardar usuario
                        </button>
                    </form>
                </div>
            </div>

            <!-- Formulario de alumnos -->
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">
                    Formulario de alumnos
                </div>

                <div class="card-body">
                    <form id="formAlumno">
                        <div class="mb-3">
                            <label for="nombreAlumno" class="form-label">Nombre del alumno</label>
                            <input type="text" class="form-control" id="nombreAlumno" placeholder="Nombre completo">
                        </div>

                        <div class="mb-3">
                            <label for="numeroControl" class="form-label">Número de control</label>
                            <input type="text" class="form-control" id="numeroControl" placeholder="6 dígitos">
                        </div>

                        <div class="mb-3">
                            <label for="edadAlumno" class="form-label">Edad</label>
                            <input type="number" class="form-control" id="edadAlumno" placeholder="Ejemplo: 18">
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Validar alumno
                        </button>
                    </form>
                </div>
            </div>

        </section>
    </main>

    <!-- Modal de edad -->
    <div class="modal fade" id="modalEdad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div id="modalHeader" class="modal-header">
                    <h5 class="modal-title" id="tituloModalEdad">Resultado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p id="mensajeModalEdad"></p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS por CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="js/utileria.js"></script>
</body>
</html>
